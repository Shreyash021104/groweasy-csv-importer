services:
  - type: web
    name: groweasy-csv-importer-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        sync: false
      - key: AI_PROVIDER
        value: heuristic
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
